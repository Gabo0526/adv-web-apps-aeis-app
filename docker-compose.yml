name: aeis

networks:
  aeis-net:
    driver: bridge

volumes:
  mysql-auth-data:
  mysql-locker-data:
  mysql-rental-data:
  mongo-help-data:
  prometheus-data:
  grafana-data:
  loki-data:

services:
  mysql-auth:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_AUTH_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_AUTH_DATABASE}
      MYSQL_USER: ${MYSQL_AUTH_USER}
      MYSQL_PASSWORD: ${MYSQL_AUTH_PASSWORD}
    ports:
      # Publicado solo para desarrollo local (correr auth-service con `mvn spring-boot:run`
      # fuera de Docker). Puerto host 3307 (no 3306) para no chocar con un MySQL local.
      # Cuando auth-service quede dockerizado y conectado por el gateway (fases 3/10),
      # puede volver a quedar interno.
      - "3307:3306"
    volumes:
      - mysql-auth-data:/var/lib/mysql
    networks:
      - aeis-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_AUTH_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  mysql-locker:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_LOCKER_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_LOCKER_DATABASE}
      MYSQL_USER: ${MYSQL_LOCKER_USER}
      MYSQL_PASSWORD: ${MYSQL_LOCKER_PASSWORD}
    ports:
      # Publicado solo para desarrollo local (correr locker-service con `mvn spring-boot:run`
      # fuera de Docker), igual que mysql-auth:3307.
      - "3308:3306"
    volumes:
      - mysql-locker-data:/var/lib/mysql
    networks:
      - aeis-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_LOCKER_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  mysql-rental:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_RENTAL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_RENTAL_DATABASE}
      MYSQL_USER: ${MYSQL_RENTAL_USER}
      MYSQL_PASSWORD: ${MYSQL_RENTAL_PASSWORD}
    ports:
      # Publicado solo para desarrollo local (correr rental-service con `mvn spring-boot:run`
      # fuera de Docker), igual que mysql-auth:3307 / mysql-locker:3308.
      - "3310:3306"
    volumes:
      - mysql-rental-data:/var/lib/mysql
    networks:
      - aeis-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_RENTAL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  mongo-help:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_HELP_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_HELP_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_HELP_DATABASE}
    ports:
      # Publicado solo para desarrollo local (correr help-service con `mvn spring-boot:run`
      # fuera de Docker), igual que mysql-auth:3307 / mysql-locker:3308 / mysql-rental:3310.
      - "27017:27017"
    volumes:
      - mongo-help-data:/data/db
    networks:
      - aeis-net
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  auth-service:
    build: backend/auth-service
    environment:
      TZ: America/Guayaquil
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-auth:3306/${MYSQL_AUTH_DATABASE}
      SPRING_DATASOURCE_USERNAME: ${MYSQL_AUTH_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_AUTH_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
      ADMIN_DEFAULT_PASSWORD: ${ADMIN_DEFAULT_PASSWORD}
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD}
      SPRING_MAIL_SMTP_AUTH: ${SPRING_MAIL_SMTP_AUTH}
      SPRING_MAIL_SMTP_STARTTLS_ENABLE: ${SPRING_MAIL_SMTP_STARTTLS_ENABLE}
    networks:
      - aeis-net
    depends_on:
      mysql-auth:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  locker-service:
    build: backend/locker-service
    environment:
      TZ: America/Guayaquil
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-locker:3306/${MYSQL_LOCKER_DATABASE}
      SPRING_DATASOURCE_USERNAME: ${MYSQL_LOCKER_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_LOCKER_PASSWORD}
    networks:
      - aeis-net
    depends_on:
      mysql-locker:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8082/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  rental-service:
    build: backend/rental-service
    environment:
      TZ: America/Guayaquil
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-rental:3306/${MYSQL_RENTAL_DATABASE}
      SPRING_DATASOURCE_USERNAME: ${MYSQL_RENTAL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_RENTAL_PASSWORD}
      LOCKER_SERVICE_URL: http://locker-service:8082
      AUTH_SERVICE_URL: http://auth-service:8081
      PAYPHONE_TOKEN: ${PAYPHONE_TOKEN}
      PAYPHONE_STORE_ID: ${PAYPHONE_STORE_ID}
    networks:
      - aeis-net
    depends_on:
      mysql-rental:
        condition: service_healthy
      locker-service:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8083/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  help-service:
    build: backend/help-service
    environment:
      TZ: America/Guayaquil
      SPRING_DATA_MONGODB_URI: mongodb://${MONGO_HELP_ROOT_USER}:${MONGO_HELP_ROOT_PASSWORD}@mongo-help:27017/${MONGO_HELP_DATABASE}?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
    networks:
      - aeis-net
    depends_on:
      mongo-help:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8084/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  api-gateway:
    build: backend/api-gateway
    environment:
      TZ: America/Guayaquil
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      AUTH_SERVICE_URL: http://auth-service:8081
      LOCKER_SERVICE_URL: http://locker-service:8082
      RENTAL_SERVICE_URL: http://rental-service:8083
      HELP_SERVICE_URL: http://help-service:8084
      HELP_SERVICE_WS_URL: ws://help-service:8084
    ports:
      - "8080:8080"
    networks:
      - aeis-net
    depends_on:
      auth-service:
        condition: service_healthy
      locker-service:
        condition: service_healthy
      rental-service:
        condition: service_healthy
      help-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  frontend:
    build:
      context: frontend
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_WS_URL: ${VITE_WS_URL}
    ports:
      - "5173:80"
    networks:
      - aeis-net
    depends_on:
      api-gateway:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - aeis-net
    depends_on:
      - auth-service
      - locker-service
      - rental-service
      - help-service
      - api-gateway

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - aeis-net
    depends_on:
      - prometheus
      - loki

  loki:
    image: grafana/loki:latest
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    networks:
      - aeis-net

  promtail:
    image: grafana/promtail:latest
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - aeis-net
    depends_on:
      - loki
