spring.application.name=locker-service
server.port=${SERVER_PORT:8082}

# Database (MySQL en Docker, mapeado a localhost:3308 para desarrollo local)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3308/lockerdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:locker_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:lockerpass}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}

# JPA
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}

# Actuator / Prometheus
management.endpoints.web.exposure.include=health,info,prometheus
