spring.application.name=help-service
server.port=${SERVER_PORT:8084}

# MongoDB (Docker: usuario root de mongo-help, authSource=admin; mapeado a
# localhost:27017 para desarrollo local fuera de Docker)
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://root:helppass@localhost:27017/helpdb?authSource=admin}

# JWT (mismo secreto compartido que el resto de los servicios)
jwt.secret=${JWT_SECRET:devsecretdevsecretdevsecretdevsecret}

# Actuator / Prometheus
management.endpoints.web.exposure.include=health,info,prometheus
