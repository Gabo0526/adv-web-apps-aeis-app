spring.application.name=rental-service
server.port=${SERVER_PORT:8083}

# Database (MySQL en Docker, mapeado a localhost:3310 para desarrollo local)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3310/rentaldb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:rental_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:rentalpass}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}

# JPA
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}

# Actuator / Prometheus
management.endpoints.web.exposure.include=health,info,prometheus

# Clientes internos (ver PLAN.md 6.2)
locker-service.url=${LOCKER_SERVICE_URL:http://locker-service:8082}
auth-service.url=${AUTH_SERVICE_URL:http://auth-service:8081}

# Circuit Breaker: ventana 10, umbral 50%, espera 10s en abierto
resilience4j.circuitbreaker.instances.lockerService.sliding-window-size=10
resilience4j.circuitbreaker.instances.lockerService.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.lockerService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.lockerService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.lockerService.permitted-number-of-calls-in-half-open-state=3

resilience4j.circuitbreaker.instances.authService.sliding-window-size=10
resilience4j.circuitbreaker.instances.authService.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.authService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.authService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.authService.permitted-number-of-calls-in-half-open-state=3
