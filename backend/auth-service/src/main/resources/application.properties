spring.application.name=auth-service
server.port=${SERVER_PORT:8081}

# Database (MySQL en Docker, mapeado a localhost:3307 para desarrollo local)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/authdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:auth_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:authpass}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}

# JPA
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}

# Mail
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}

# JWT
jwt.secret=${JWT_SECRET:devsecretdevsecretdevsecretdevsecret}
jwt.expiration-hours=${JWT_EXPIRATION_HOURS:8}

# App
app.frontend-url=${FRONTEND_URL:http://localhost:5173}
app.admin.default-password=${ADMIN_DEFAULT_PASSWORD:}

# Actuator / Prometheus
management.endpoints.web.exposure.include=health,info,prometheus
management.metrics.tags.application=${spring.application.name}
