name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: backend (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [api-gateway, auth-service, locker-service, rental-service, help-service]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: mvn verify
        working-directory: backend/${{ matrix.service }}
        run: mvn -B verify

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci
        working-directory: frontend
        run: npm ci

      - name: npm run lint
        working-directory: frontend
        run: npm run lint

      - name: npm run build
        working-directory: frontend
        run: npm run build
