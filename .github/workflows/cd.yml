name: CD

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api-gateway
            context: backend/api-gateway
            build_args: ""
          - service: auth-service
            context: backend/auth-service
            build_args: ""
          - service: locker-service
            context: backend/locker-service
            build_args: ""
          - service: rental-service
            context: backend/rental-service
            build_args: ""
          - service: help-service
            context: backend/help-service
            build_args: ""
          - service: frontend
            context: frontend
            build_args: |
              VITE_API_URL=http://localhost:8080/api
              VITE_WS_URL=ws://localhost:8080/ws
    steps:
      - uses: actions/checkout@v4

      - name: Compute image name (lowercase)
        run: |
          echo "IMAGE_NAME=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/adv-web-apps-aeis-app-${{ matrix.service }}" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          build-args: ${{ matrix.build_args }}
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
